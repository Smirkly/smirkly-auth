name: Pages

'on':
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - docs/**
      - openapi/**
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site/openapi
          cp -R docs/. _site/
          cp openapi/auth-v0.yaml _site/openapi/auth-v0.yaml

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
