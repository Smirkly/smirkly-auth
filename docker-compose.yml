version: "3.9"

services:
  smirkly-postgres:
    image: postgres:16
    container_name: smirkly-postgres
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d/

  smirkly-redis:
    image: redis:7-alpine
    container_name: smirkly-redis
    restart: always
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]

volumes:
  pgdata:
