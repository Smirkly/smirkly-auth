config_vars: configs/config_vars.yaml

components_manager:
    event_thread_pool:
        threads: $event-threads
        threads#fallback: 2

    task_processors:
        main-task-processor:
            thread_name: main-worker
            worker_threads: $worker-threads
            worker_threads#fallback: 4

        fs-task-processor:
            thread_name: fs-worker
            worker_threads: $worker-fs-threads
            worker_threads#fallback: 2

        monitor-task-processor:
            thread_name: mon-worker
            worker_threads: $worker-monitor-threads
            worker_threads#fallback: 1

        email-outbox-task-processor:
            thread_name: email-worker
            worker_threads: $worker-email-outbox-threads
            worker_threads#fallback: 1

    default_task_processor: main-task-processor

    components:

        postgres-auth:
            dbconnection: $postgres-dbconnection
            blocking_task_processor: fs-task-processor
            sync-start: true

        auth-infra:
            postgres-component: postgres-auth

        auth-http:
            trusted-proxy-cidrs:
                - 127.0.0.1/32
                - ::1/128

        auth-security:
            verification_code_length: 6
            jwt:
                issuer: smirkly-auth
                audience: $AUTH_JWT_AUDIENCE
                key-id: $AUTH_JWT_KEY_ID
                access-token-ttl-seconds: 900
                refresh-token-ttl-seconds: 2592000
                private-key-path: $AUTH_JWT_PRIVATE_KEY_PATH
                public-key-path: $AUTH_JWT_PUBLIC_KEY_PATH

        email-outbox-worker:
            enabled: true
            task_processor: email-outbox-task-processor

            poll_interval_ms: 1000

            smtp:
                host: $AUTH_SMTP_HOST
                port: $AUTH_SMTP_PORT
                tls_mode: $AUTH_SMTP_TLS_MODE
                username: $AUTH_SMTP_USERNAME
                app_password: $AUTH_SMTP_APP_PASSWORD
                from_email: $AUTH_SMTP_FROM_EMAIL
                from_name: $AUTH_SMTP_FROM_NAME
                connect_timeout_ms: 20000
                timeout_ms: 30000

        auth-service:
            infra-component: auth-infra
            security-component: auth-security
        server:
            listener:
                port: $server-port
                port#fallback: 8080
                task_processor: main-task-processor

            listener-monitor:
                port: $monitor-server-port
                port#fallback: 8081
                task_processor: monitor-task-processor

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: $logger-level
                    overflow_behavior: discard

        dynamic-config:
            updates-enabled: $dynamic-config-updates-enabled
            updates-enabled#fallback: true
            fs-cache-path: $dynamic-config-cache-path
            defaults:
                HTTP_CLIENT_CONNECTION_POOL_SIZE: 1000
                USERVER_RPS_CCONTROL_ENABLED: true
                POSTGRES_DEFAULT_COMMAND_CONTROL:
                    network_timeout_ms: 1000
                    statement_timeout_ms: 1000

        dynamic-config-client:
            load-enabled: $dynamic-config-updates-enabled
            load-enabled#fallback: true
            http-client: http-client
            config-url: $dynamic-config-server-url
            http-retries: 5
            http-timeout: 20s
            service-name: $dynamic-config-service-name
            service-name#fallback: smirkly-auth

        dynamic-config-client-updater:
            load-enabled: $dynamic-config-updates-enabled
            load-enabled#fallback: true
            config-settings: false
            first-update-fail-ok: true
            full-update-interval: $dynamic-config-full-update-interval
            full-update-interval#fallback: 1m
            update-interval: $dynamic-config-update-interval
            update-interval#fallback: 5s

        testsuite-support: {}

        congestion-control:
            fake-mode: false
            only-rtc: false
            min-cpu: 1
            load-enabled: true

        http-client:
        http-client-middleware-pipeline:
        http-client-core:
            fs-task-processor: fs-task-processor
            user-agent: smirkly-auth

        dns-client:
            fs-task-processor: fs-task-processor

        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor
            throttling_enabled: false

        handler-server-monitor:
            path: /service/monitor
            method: GET
            task_processor: monitor-task-processor
            format: prometheus

        handler-log-level:
            path: /service/log-level/{level}
            method: GET,PUT
            task_processor: monitor-task-processor

        handler-dynamic-debug-log:
            path: /service/log/dynamic-debug
            method: GET,PUT,DELETE
            task_processor: monitor-task-processor

        handler-inspect-requests:
            path: /service/inspect-requests
            method: GET
            task_processor: monitor-task-processor

        handler-dns-client-control:
            path: /service/dnsclient/{command}
            method: POST
            task_processor: monitor-task-processor

        handler-on-log-rotate:
            path: /service/on-log-rotate/
            method: POST
            task_processor: monitor-task-processor

        handler-auth-sign-up:
            path: /auth/v0/sign-up
            method: POST
            task_processor: main-task-processor

        handler-verify-email:
            path: /auth/v0/verify-email
            method: POST
            task_processor: main-task-processor

        handler-resend-email-verification:
            path: /auth/v0/verify-email/resend
            method: POST
            task_processor: main-task-processor

        handler-auth-sign-in:
            path: /auth/v0/sign-in
            method: POST
            task_processor: main-task-processor

        handler-auth-refresh:
            path: /auth/v0/refresh
            method: POST
            task_processor: main-task-processor

        handler-auth-logout:
            path: /auth/v0/logout
            method: POST
            task_processor: main-task-processor

        handler-auth-change-password:
            path: /auth/v0/change-password
            method: POST
            task_processor: main-task-processor

        handler-auth-me:
            path: /auth/v0/me
            method: GET
            task_processor: main-task-processor

        handler-auth-sessions:
            path: /auth/v0/sessions
            method: GET
            task_processor: main-task-processor

        handler-auth-sessions-revoke-all:
            path: /auth/v0/sessions
            method: DELETE
            task_processor: main-task-processor

        handler-auth-session-revoke:
            path: /auth/v0/sessions/{session_id}
            method: DELETE
            task_processor: main-task-processor

        handler-auth-jwks:
            path: /auth/v0/.well-known/jwks.json
            method: GET
            task_processor: main-task-processor
