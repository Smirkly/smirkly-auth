config_vars: ../configs/config_vars.yaml

components_manager:
    task_processors:                  # Task processor is an executor for coroutine tasks

        main-task-processor:          # Make a task processor for CPU-bound coroutine tasks.
            worker_threads: $worker-threads         # Process tasks in 4 threads.

        fs-task-processor:            # Make a separate task processor for filesystem bound tasks.
            worker_threads: $worker-fs-threads

    default_task_processor: main-task-processor

    components:                       # Configuring components that were registered via component_list

        postgres-auth:
            dbconnection: "postgresql://smirkly_auth:smirkly_auth@localhost:5432/smirkly_auth"
            blocking_task_processor: fs-task-processor
            sync-start: true

        #redis-auth:
        #    thread-pool-size: 4
        #    secdist_alias: auth-redis

        auth-infra:
            postgres-component: postgres-auth

        email-outbox-worker:
            enabled: true
            task_processor: main-task-processor

            poll_interval_ms: 1000
            batch_size: 20

            max_attempts: 10
            stuck_timeout_seconds: 300

            retry_base_delay_seconds: 2
            retry_max_delay_seconds: 600

            smtp:
                host: $AUTH_SMTP_HOST
                port: $AUTH_SMTP_PORT
                tls_mode: $AUTH_SMTP_TLS_MODE
                username: $AUTH_SMTP_USERNAME
                app_password: $AUTH_SMTP_APP_PASSWORD
                from_email: $AUTH_SMTP_FROM_EMAIL
                from_name: $AUTH_SMTP_FROM_NAME
                connect_timeout_ms: 20000
                timeout_ms: 30000

        auth-service:
            jwt:
                issuer: smirkly-auth
                audience: $AUTH_JWT_AUDIENCE
                key-id: $AUTH_JWT_KEY_ID
                access-token-ttl-seconds: 900
                refresh-token-ttl-seconds: 2592000
                private-key-path: $AUTH_JWT_PRIVATE_KEY_PATH
                public-key-path: $AUTH_JWT_PUBLIC_KEY_PATH

        server:
            listener:                 # configuring the main listening socket...
                port: $server-port            # ...to listen on this port and...
                task_processor: main-task-processor    # ...process incoming requests on this task processor.

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: $logger-level
                    overflow_behavior: discard  # Drop logs if the system is too busy to write them down.

        # Dynamic config options. Cache is disabled, updates are disabled.
        dynamic-config:
            # For most of userver dynamic configs, defaults are used, some are overridden here.
            # See userver "dynamic config" docs for what configs exist.
            defaults:
                HTTP_CLIENT_CONNECTION_POOL_SIZE: 1000

        testsuite-support: {}

        congestion-control:
            min-cpu: 1
            fake-mode: true

        #http-client-core:
        #    fs-task-processor: fs-task-processor
        #    user-agent: smirkly-auth
        #
        #http-client:
        #    core-component: http-client-core

        dns-client:
            fs-task-processor: fs-task-processor

        tests-control:
            load-enabled: true
            path: /tests/{action}
            method: POST
            task_processor: main-task-processor

        handler-auth-sign-up:
            path: /auth/v0/sign-up
            method: POST
            task_processor: main-task-processor

        handler-verify-email:
            path: /auth/v0/verify-email
            method: GET
            task_processor: main-task-processor

        handler-auth-sign-in:
            path: /auth/v0/sign-in
            method: POST
            task_processor: main-task-processor

        handler-auth-refresh:
            path: /auth/v0/refresh
            method: POST
            task_processor: main-task-processor

        handler-auth-me:
            path: /auth/v0/me
            method: GET
            task_processor: main-task-processor

        handler-auth-sessions:
            path: /auth/v0/sessions
            method: GET
            task_processor: main-task-processor

        handler-auth-session-revoke:
            path: /auth/v0/sessions/{session_id}
            method: DELETE
            task_processor: main-task-processor

        handler-auth-jwks:
            path: /auth/v0/.well-known/jwks.json
            method: GET
            task_processor: main-task-processor
